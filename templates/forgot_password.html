<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{

    width:430px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    text-align:center;
    color:white;

}

input{

    width:90%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;

}

button{

    width:95%;
    padding:14px;
    border:none;
    border-radius:8px;
    cursor:pointer;

    background:linear-gradient(90deg,#7c3aed,#9333ea);

    color:white;

    font-size:16px;

    font-weight:bold;

    transition:.3s;

}

button:hover{

    transform:translateY(-3px);

    box-shadow:0 0 20px #9333ea;

}

input:focus{

    outline:none;
    border:2px solid #9333ea;
    box-shadow:0 0 15px #9333ea;

}

</style>

</head>

<body>

<div class="box">
<h3 style="color:#ffd700; margin-bottom:20px;">
    🤖 AI Mock Interview Platform
</h3>

<h2>🔑 Forgot Password</h2>
<p style="color:#cbd5e1; margin-bottom:25px;">
Reset your account password securely.
</p>

<form action="/reset_password" method="POST">

<input
type="email"
name="email"
placeholder="Enter Email"
required>

<input
type="password"
name="new_password"
placeholder="New Password"
required>

<input
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

<button>

Reset Password

</button>

</form>

<p style="margin-top:20px;">

<a href="/login"
style="color:#ffd700;text-decoration:none;font-weight:bold;">

← Back to Login

</a>

</p>

</div>

</body>
</html>
