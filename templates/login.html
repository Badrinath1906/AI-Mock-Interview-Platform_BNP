<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
            135deg,
            #4b0082,
            #d63384
            );

            font-family:Arial,sans-serif;
        }

        .container{

            width:400px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(10px);

            padding:30px;

            border-radius:20px;

            color:white;

            box-shadow:
            0 8px 20px rgba(0,0,0,0.3);
        }

        .heading{

            text-align:center;

            color:#ffd700;

            margin-bottom:10px;

            font-weight:bold;
        }

        h1{

            text-align:center;

            margin-bottom:25px;
        }

        input{

            width:100%;

            padding:12px;

            margin:10px 0;

            border:none;

            border-radius:10px;

            box-shadow:
            0 2px 8px rgba(0,0,0,0.2);
        }

        button{

            width:100%;

            padding:12px;

            margin-top:15px;

            border:none;

            border-radius:10px;

            background:#ffd700;

            font-size:16px;

            font-weight:bold;

            cursor:pointer;
        }

        button:hover{

            background:white;

            transform:scale(1.03);

            transition:0.3s;
        }

        a{
            color:#ffd700;
            text-decoration:none;
            font-weight:bold;
        }

        a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="container">

    <p class="heading">
        🤖 AI Mock Interview Platform
    </p>

    <h1>🔐 Login</h1>

    <form action="/login_user" method="POST">

        <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required>

        <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

    <p style="text-align:center;margin-top:15px;">

        Don't have an account?

        <a href="/register">
            Register
        </a>

    </p>
    <p style="text-align:center;margin-top:10px;">

    <a href="/forgot_password"
       style="color:#ffd700;text-decoration:none;font-weight:bold;">

        Forgot Password?

    </a>

</p>

</div>

</body>
</html>
